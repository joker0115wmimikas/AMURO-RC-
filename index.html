<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安室RC 総合管理ポータル</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      Users, Lock, Unlock, UserPlus, Banknote, Trophy,
      ChevronRight, UserCircle2, FileText, LogOut, Phone, 
      HeartPulse, GraduationCap, Building, School, CheckCircle2, 
      Home, ListChecks, AlertTriangle
    } from 'lucide-react';

    // --- Constants & Masters ---
    const OFFICERS = ["久保", "桝本", "山道", "岩﨑", "加藤"];
    const ADMIN_PIN = "2026";
    const GRADES = ['1年','2年','3年','4年','5年','6年','中学1年','中学2年','中学3年'];

    const TOURNAMENTS = [
      { id: "himeji_apr", name: "4月 姫路市陸上競技記録会", eventFee: 600, programFee: 700, events: ["100m", "1500m", "走幅跳", "走高跳", "ジャベリックボール投", "4×100mリレー"] },
      { id: "hyogo_may", name: "5月 兵庫県小学生陸上競技大会", eventFee: 800, programFee: 1000, events: ["100m", "800m", "走幅跳", "ソフトボール投"] }
    ];

    // 初期デモデータ
    const INITIAL_MEMBERS = [
      { id: "m1", name: "久保 いおり", kana: "くぼ いおり", grade: "6年", gender: "女子", schoolName: "安室小学校", eventType: "短距離", status: "updated", payments: {term1: true, insurance: true}, isActive: true, createdAt: Date.now() },
      { id: "m2", name: "桝本 紗那", kana: "ますもと さな", grade: "6年", gender: "女子", schoolName: "安室小学校", eventType: "短距離", status: "updated", payments: {term1: true, insurance: true}, isActive: true, createdAt: Date.now() },
      { id: "m3", name: "山道 康太", kana: "やまみち こうた", grade: "5年", gender: "男子", schoolName: "安室小学校", eventType: "短距離", status: "updated", payments: {term1: false, insurance: false}, isActive: true, createdAt: Date.now() },
      { id: "m4", name: "富永 主将", kana: "とみなが", grade: "6年", gender: "男子", schoolName: "安室小学校", eventType: "長距離", status: "updated", payments: {term1: true, insurance: true}, isActive: true, createdAt: Date.now() }
    ];

    function App() {
      const [view, setView] = useState('portal'); // portal, entry, procedure, pinEntry, adminAuth, admin
      const [procedureType, setProcedureType] = useState('new');
      const [adminName, setAdminName] = useState('');
      
      // ローカルストレージを使用したデータ管理
      const [members, setMembers] = useState(() => {
        const saved = localStorage.getItem('amuro_members');
        return saved ? JSON.parse(saved) : INITIAL_MEMBERS;
      });

      const [entries, setEntries] = useState(() => {
        const saved = localStorage.getItem('amuro_entries');
        return saved ? JSON.parse(saved) : [];
      });

      // データが変更されたら保存
      useEffect(() => {
        localStorage.setItem('amuro_members', JSON.stringify(members));
      }, [members]);

      useEffect(() => {
        localStorage.setItem('amuro_entries', JSON.stringify(entries));
      }, [entries]);

      const goPortal = () => setView('portal');
      const goAdmin = () => adminName ? setView('admin') : setView('pinEntry');

      // データ操作用関数
      const saveMember = (data, isNew) => {
        if (isNew) {
          setMembers(prev => [{ ...data, id: 'm_' + Date.now(), createdAt: Date.now() }, ...prev]);
        } else {
          setMembers(prev => prev.map(m => m.id === data.id ? { ...m, ...data, updatedAt: Date.now() } : m));
        }
      };

      const saveEntry = (data) => {
        setEntries(prev => [{ ...data, id: 'e_' + Date.now(), createdAt: Date.now() }, ...prev]);
      };

      return (
        <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-20">
          <Header view={view} goPortal={goPortal} goAdmin={goAdmin} />
          
          <main className="max-w-5xl mx-auto p-4 py-8">
            {view === 'portal' && <PortalView onSelectEntry={() => setView('entry')} onSelectProcedure={(type) => { setProcedureType(type); setView('procedure'); }} />}
            {view === 'entry' && <EntryFormView members={members.filter(m=>m.isActive)} onSave={saveEntry} onBack={goPortal} />}
            {view === 'procedure' && <ProcedureFormView type={procedureType} members={members} onSave={saveMember} onBack={goPortal} />}
            {view === 'pinEntry' && <PinEntryView onSuccess={() => setView('adminAuth')} />}
            {view === 'adminAuth' && <AdminAuthView setAdminName={(name) => { setAdminName(name); setView('admin'); }} />}
            {view === 'admin' && <AdminDashboard members={members} setMembers={setMembers} entries={entries} setEntries={setEntries} adminName={adminName} onLogout={() => { setAdminName(''); setView('adminAuth'); }} />}
          </main>
        </div>
      );
    }

    // --- Components ---
    function Header({ view, goPortal, goAdmin }) {
      return (
        <header className="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-20">
          <div className="max-w-5xl mx-auto flex justify-between items-center">
            <div className="flex items-center space-x-2 cursor-pointer" onClick={goPortal}>
              <Home className="h-6 w-6 text-blue-400" />
              <h1 className="text-xl font-bold tracking-wide">安室RC ポータル</h1>
            </div>
            <div className="flex">
              {view === 'portal' ? (
                <button onClick={goAdmin} className="flex items-center space-x-1 px-3 py-1.5 rounded-md text-sm font-medium bg-slate-700 text-slate-200 hover:bg-slate-600 hover:text-white transition-colors border border-slate-600">
                  <Lock className="h-4 w-4" /><span>役員専用</span>
                </button>
              ) : (view === 'entry' || view === 'procedure') ? (
                <button onClick={goPortal} className="flex items-center space-x-1 px-3 py-1.5 rounded-md text-sm font-medium bg-white text-slate-800 shadow transition-colors">
                  <ChevronRight className="h-4 w-4 rotate-180" /><span>トップへ戻る</span>
                </button>
              ) : null}
            </div>
          </div>
        </header>
      );
    }

    function PortalView({ onSelectEntry, onSelectProcedure }) {
      return (
        <div className="max-w-3xl mx-auto animate-in fade-in space-y-8">
          <section>
            <div className="mb-4">
              <h2 className="text-xl font-bold text-slate-800 flex items-center"><FileText className="w-5 h-5 mr-2 text-emerald-600"/>各種手続き（入会・更新・退会）</h2>
              <p className="text-slate-500 text-sm mt-1">年度の変わり目や、新しく入会される方はこちら</p>
            </div>
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
              <button onClick={() => onSelectProcedure('new')} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:border-emerald-500 hover:shadow-md transition-all text-left group">
                <div className="bg-emerald-100 p-2.5 rounded-xl text-emerald-600 inline-block mb-3 group-hover:scale-110 transition-transform"><UserPlus className="w-5 h-5" /></div>
                <h3 className="font-bold mb-1">新規入会</h3><p className="text-xs text-slate-500">新しく入会される方</p>
              </button>
              <button onClick={() => onSelectProcedure('update')} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-500 hover:shadow-md transition-all text-left group">
                <div className="bg-blue-100 p-2.5 rounded-xl text-blue-600 inline-block mb-3 group-hover:scale-110 transition-transform"><FileText className="w-5 h-5" /></div>
                <h3 className="font-bold mb-1">継続更新</h3><p className="text-xs text-slate-500">次年度も継続される方</p>
              </button>
              <button onClick={() => onSelectProcedure('leave')} className="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 hover:border-rose-500 hover:shadow-md transition-all text-left group">
                <div className="bg-rose-100 p-2.5 rounded-xl text-rose-600 inline-block mb-3 group-hover:scale-110 transition-transform"><LogOut className="w-5 h-5" /></div>
                <h3 className="font-bold mb-1">退会手続き</h3><p className="text-xs text-slate-500">クラブを退会される方</p>
              </button>
            </div>
          </section>

          <section>
            <div className="mb-4">
              <h2 className="text-xl font-bold text-slate-800 flex items-center"><Trophy className="w-5 h-5 mr-2 text-amber-500"/>大会エントリー</h2>
            </div>
            <button onClick={onSelectEntry} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 p-6 rounded-2xl shadow-md hover:shadow-lg transition-all text-left flex items-center justify-between group">
              <div className="flex items-center">
                <div className="bg-white/20 p-3 rounded-full text-white mr-4"><ListChecks className="w-6 h-6" /></div>
                <div>
                  <h3 className="text-lg font-bold text-white mb-1">大会への出場申し込み</h3>
                  <p className="text-blue-100 text-sm">※名簿に登録されている選手のみ表示されます</p>
                </div>
              </div>
              <ChevronRight className="w-6 h-6 text-white opacity-70 group-hover:opacity-100 group-hover:translate-x-1 transition-all" />
            </button>
          </section>
        </div>
      );
    }

    function EntryFormView({ members, onSave, onBack }) {
      const [selectedTournamentId, setSelectedTournamentId] = useState(TOURNAMENTS[0].id);
      const activeTournament = TOURNAMENTS.find(t => t.id === selectedTournamentId);
      const [selectedMemberId, setSelectedMemberId] = useState('');
      const [formData, setFormData] = useState({ entryType: 'amuro', schoolName: '', events: [], needsProgram: false });
      const [submittedData, setSubmittedData] = useState(null);

      const activeMember = members.find(m => m.id === selectedMemberId);

      useEffect(() => { setFormData(prev => ({ ...prev, events: [], needsProgram: false })); }, [selectedTournamentId, selectedMemberId]);
      useEffect(() => { if(activeMember) setFormData(prev => ({...prev, schoolName: activeMember.schoolName||''})); }, [activeMember]);

      const totalFee = (formData.events.length * activeTournament.eventFee) + (formData.needsProgram ? activeTournament.programFee : 0);
      const toggleEvent = (event) => setFormData(p => ({ ...p, events: p.events.includes(event) ? p.events.filter(e => e !== event) : [...p.events, event] }));

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!activeMember) return alert('選手を選択してください。');
        if (formData.events.length === 0) return alert('出場種目を1つ以上選択してください。');

        onSave({
          memberId: activeMember.id, name: activeMember.name, grade: activeMember.grade, gender: activeMember.gender,
          entryType: formData.entryType, schoolName: formData.entryType === 'school' ? formData.schoolName : '',
          events: formData.events, needsProgram: formData.needsProgram,
          tournamentId: activeTournament.id, tournamentName: activeTournament.name,
          fee: totalFee, isPaid: false, receivedBy: ''
        });
        setSubmittedData({ name: activeMember.name, fee: totalFee, tName: activeTournament.name });
      };

      if (submittedData) {
        return (
          <div className="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm text-center border mt-10">
            <CheckCircle2 className="w-16 h-16 text-green-500 mx-auto mb-4" />
            <h2 className="text-2xl font-bold mb-2">エントリー完了</h2>
            <p className="font-bold text-blue-600 mb-4 bg-blue-50 py-2 rounded-lg">{submittedData.tName}</p>
            <p className="text-slate-600 mb-6">{submittedData.name} 選手の申込を記録しました。<br/>集金袋に <strong className="text-blue-600 text-xl mx-1">{submittedData.fee.toLocaleString()}円</strong> を入れ役員へお渡しください。</p>
            <button onClick={onBack} className="bg-slate-100 text-slate-700 px-6 py-3 rounded-xl font-medium w-full">ポータルへ戻る</button>
          </div>
        );
      }

      return (
        <div className="max-w-xl mx-auto">
          <h2 className="text-2xl font-bold text-slate-800 flex items-center mb-6"><Trophy className="w-6 h-6 mr-2 text-amber-500"/>大会エントリー</h2>
          <div className="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 mb-6 flex items-center gap-3">
            <div className="flex-1">
              <label className="block text-xs font-bold text-slate-500 mb-1">エントリーする大会を選択</label>
              <select className="w-full text-base font-bold text-slate-800 border-none bg-transparent outline-none p-0 cursor-pointer" value={selectedTournamentId} onChange={(e) => setSelectedTournamentId(e.target.value)}>
                {TOURNAMENTS.map(t => <option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
            </div>
          </div>

          <form onSubmit={handleSubmit} className="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <div className="p-5 border-b space-y-4">
              <h3 className="font-bold text-lg flex items-center"><span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">1</span>選手を選択</h3>
              <select required className="w-full border rounded-lg p-3 outline-none text-lg font-medium bg-slate-50" value={selectedMemberId} onChange={e => setSelectedMemberId(e.target.value)}>
                <option value="" disabled>-- 名簿から選択 --</option>
                {members.map(m => <option key={m.id} value={m.id}>{m.grade} | {m.name}</option>)}
              </select>
            </div>

            {activeMember && (
              <div>
                <div className="p-5 border-b bg-slate-50/50 space-y-4">
                  <h3 className="font-bold text-lg flex items-center"><span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">2</span>出場区分</h3>
                  <div className="grid grid-cols-2 gap-3">
                    <label className={`border rounded-xl p-4 cursor-pointer flex flex-col items-center ${formData.entryType === 'amuro' ? 'border-blue-500 bg-blue-50 ring-2 ring-blue-500' : 'bg-white'}`}>
                      <input type="radio" className="sr-only" checked={formData.entryType === 'amuro'} onChange={() => setFormData({...formData, entryType: 'amuro'})} />
                      <Building className={`w-6 h-6 mb-2 ${formData.entryType === 'amuro' ? 'text-blue-600' : 'text-slate-400'}`} />
                      <span className={`font-bold text-sm ${formData.entryType === 'amuro' ? 'text-blue-800' : 'text-slate-600'}`}>安室RCとして</span>
                    </label>
                    <label className={`border rounded-xl p-4 cursor-pointer flex flex-col items-center ${formData.entryType === 'school' ? 'border-emerald-500 bg-emerald-50 ring-2 ring-emerald-500' : 'bg-white'}`}>
                      <input type="radio" className="sr-only" checked={formData.entryType === 'school'} onChange={() => setFormData({...formData, entryType: 'school'})} />
                      <School className={`w-6 h-6 mb-2 ${formData.entryType === 'school' ? 'text-emerald-600' : 'text-slate-400'}`} />
                      <span className={`font-bold text-sm ${formData.entryType === 'school' ? 'text-emerald-800' : 'text-slate-600'}`}>学校から出場</span>
                    </label>
                  </div>
                  {formData.entryType === 'school' && (
                    <input type="text" required placeholder="学校名 (例: 安室小学校)" className="w-full border rounded-lg p-3 mt-3 outline-none" value={formData.schoolName} onChange={e => setFormData({...formData, schoolName: e.target.value})} />
                  )}
                </div>

                <div className="p-5 border-b space-y-4">
                  <h3 className="font-bold text-lg flex items-center"><span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2">3</span>種目・プログラム</h3>
                  <div className="flex flex-wrap gap-2">
                    {activeTournament.events.map(ev => (
                      <button type="button" key={ev} onClick={() => toggleEvent(ev)} className={`px-4 py-2 rounded-full text-sm font-medium border ${formData.events.includes(ev) ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-600'}`}>
                        {formData.events.includes(ev) && <CheckCircle2 className="inline w-4 h-4 mr-1 -ml-1" />} {ev}
                      </button>
                    ))}
                  </div>
                  <label className="flex items-start mt-4 p-3 border rounded-xl bg-slate-50 cursor-pointer">
                    <input type="checkbox" className="w-5 h-5 mt-0.5" checked={formData.needsProgram} onChange={e => setFormData({...formData, needsProgram: e.target.checked})} />
                    <div className="ml-3"><span className="block font-medium">大会プログラムを購入する (+{activeTournament.programFee}円)</span></div>
                  </label>
                </div>

                <div className="p-5 bg-slate-800 text-white flex justify-between items-center">
                  <div><span className="text-xs text-slate-300">合計予定額</span><div className="text-2xl font-bold">¥{totalFee.toLocaleString()}</div></div>
                  <button type="submit" className="bg-blue-500 hover:bg-blue-400 px-6 py-3 rounded-xl font-bold flex items-center">確定する <ChevronRight className="w-5 h-5 ml-1" /></button>
                </div>
              </div>
            )}
          </form>
        </div>
      );
    }

    function ProcedureFormView({ type, members, onSave, onBack }) {
      const isLeave = type === 'leave';
      const title = type === 'new' ? '新規入会 申請' : type === 'update' ? '継続更新 申請' : '退会 申請';
      const color = type === 'new' ? 'emerald' : type === 'update' ? 'blue' : 'rose';

      const [selectedMemberId, setSelectedMemberId] = useState('');
      const [submitted, setSubmitted] = useState(false);

      const [formData, setFormData] = useState({
        name: '', kana: '', eventType: '短距離', birthDate: '', age: '', schoolName: '', grade: '1年', gender: '男子',
        parentFatherName: '', parentFatherPhone: '', parentFatherEmail: '', parentMotherName: '', parentMotherPhone: '', parentMotherEmail: '',
        postalCode: '', address: '', homePhone: '', fax: '', health: '良好', bloodType: 'A', height: '', notes: '', requests: '', goals: '', leaveReason: ''
      });

      useEffect(() => {
        if ((type === 'update' || type === 'leave') && selectedMemberId) {
          const m = members.find(m => m.id === selectedMemberId);
          if (m) setFormData(prev => ({ ...prev, ...m }));
        }
      }, [selectedMemberId, type, members]);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (type === 'new') {
          onSave({ ...formData, isActive: true, status: 'new', payments: { entrance: false, track: false, insurance: false, term1: false, term2: false } }, true);
        } else if (type === 'update' && selectedMemberId) {
          onSave({ id: selectedMemberId, ...formData, isActive: true, status: 'updated', payments: { entrance: true, track: false, insurance: false, term1: false, term2: false } }, false);
        } else if (type === 'leave' && selectedMemberId) {
          onSave({ id: selectedMemberId, isActive: false, status: 'leaved', leaveReason: formData.leaveReason }, false);
        }
        setSubmitted(true);
      };

      if (submitted) {
        return (
          <div className="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm text-center border mt-10">
            <CheckCircle2 className={`w-16 h-16 text-${color}-500 mx-auto mb-4`} />
            <h2 className="text-2xl font-bold mb-2">登録完了</h2>
            <p className="text-slate-600 mb-6">{isLeave ? '退会手続きを記録しました。' : '名簿に登録/更新されました。'}</p>
            <button onClick={onBack} className="bg-slate-100 text-slate-700 px-6 py-3 rounded-xl font-medium w-full">ポータルへ戻る</button>
          </div>
        );
      }

      return (
        <div className="max-w-2xl mx-auto">
          <h2 className={`text-2xl font-bold text-slate-800 flex items-center mb-6`}><FileText className={`w-6 h-6 mr-2 text-${color}-600`}/>{title}</h2>
          <form onSubmit={handleSubmit} className={`bg-white rounded-2xl shadow-sm border overflow-hidden border-t-4 border-t-${color}-500`}>
            
            {(type === 'update' || type === 'leave') && (
              <div className="p-5 bg-slate-50 border-b">
                <label className="block text-sm font-bold text-slate-700 mb-2">対象の選手を選択</label>
                <select required className="w-full border rounded-lg p-3 outline-none" value={selectedMemberId} onChange={e => setSelectedMemberId(e.target.value)}>
                  <option value="" disabled>-- 選択してください --</option>
                  {members.filter(m => m.isActive).map(m => <option key={m.id} value={m.id}>{m.grade} | {m.name}</option>)}
                </select>
              </div>
            )}

            {(!isLeave && (type === 'new' || selectedMemberId)) && (
              <div className="p-5 space-y-4">
                 <div className="grid grid-cols-2 gap-3">
                   <div className="col-span-2 sm:col-span-1"><label className="text-xs font-bold text-slate-500">氏名</label><input type="text" required value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="w-full border rounded p-2"/></div>
                   <div className="col-span-2 sm:col-span-1"><label className="text-xs font-bold text-slate-500">ふりがな</label><input type="text" required value={formData.kana} onChange={e=>setFormData({...formData, kana:e.target.value})} className="w-full border rounded p-2"/></div>
                   <div className="col-span-1"><label className="text-xs font-bold text-slate-500">学年 (新年度)</label><select value={formData.grade} onChange={e=>setFormData({...formData, grade:e.target.value})} className="w-full border rounded p-2">{GRADES.map(g=><option key={g}>{g}</option>)}</select></div>
                   <div className="col-span-1"><label className="text-xs font-bold text-slate-500">性別</label><select value={formData.gender} onChange={e=>setFormData({...formData, gender:e.target.value})} className="w-full border rounded p-2"><option>男子</option><option>女子</option></select></div>
                   <div className="col-span-2"><label className="text-xs font-bold text-slate-500">学校名</label><input type="text" required value={formData.schoolName} onChange={e=>setFormData({...formData, schoolName:e.target.value})} className="w-full border rounded p-2"/></div>
                 </div>
                 <hr/>
                 <div className="grid grid-cols-2 gap-3">
                   <div className="col-span-2"><label className="text-xs font-bold text-slate-500">保護者(代表) 氏名</label><input type="text" required value={formData.parentFatherName} onChange={e=>setFormData({...formData, parentFatherName:e.target.value})} className="w-full border rounded p-2"/></div>
                   <div className="col-span-1"><label className="text-xs font-bold text-slate-500">携帯電話</label><input type="tel" required value={formData.parentFatherPhone} onChange={e=>setFormData({...formData, parentFatherPhone:e.target.value})} className="w-full border rounded p-2"/></div>
                   <div className="col-span-1"><label className="text-xs font-bold text-slate-500">メール</label><input type="email" value={formData.parentFatherEmail} onChange={e=>setFormData({...formData, parentFatherEmail:e.target.value})} className="w-full border rounded p-2"/></div>
                 </div>
              </div>
            )}

            {isLeave && selectedMemberId && (
              <div className="p-5"><label className="text-xs font-bold text-rose-500">退会理由 (任意)</label><textarea rows="3" value={formData.leaveReason} onChange={e=>setFormData({...formData, leaveReason:e.target.value})} className="w-full border border-rose-200 rounded p-2 mt-1 bg-rose-50"></textarea></div>
            )}

            <div className="p-5 bg-slate-50 border-t flex justify-end">
              <button type="submit" disabled={isLeave && !selectedMemberId} className={`bg-${color}-600 hover:bg-${color}-700 text-white font-bold py-2.5 px-8 rounded-lg shadow`}>保存する</button>
            </div>
          </form>
        </div>
      );
    }

    // --- Admin Views ---
    function PinEntryView({ onSuccess }) {
      const [pin, setPin] = useState('');
      const [error, setError] = useState(false);
      const handleSubmit = (e) => { e.preventDefault(); if (pin === ADMIN_PIN) onSuccess(); else { setError(true); setPin(''); } };
      return (
        <div className="max-w-sm mx-auto mt-12 text-center">
          <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
            <Lock className="w-12 h-12 text-slate-400 mx-auto mb-4" />
            <h2 className="text-xl font-bold mb-6">役員専用パスコード(2026)</h2>
            <form onSubmit={handleSubmit}>
              <input type="password" inputMode="numeric" maxLength={4} value={pin} onChange={(e) => { setPin(e.target.value); setError(false); }} className={`w-full text-center text-3xl tracking-widest p-4 border rounded-xl outline-none ${error ? 'border-red-500 bg-red-50' : 'border-slate-300'}`} placeholder="••••" autoFocus />
              <button type="submit" className="w-full mt-6 bg-slate-800 text-white font-bold py-3 rounded-xl">ログイン</button>
            </form>
          </div>
        </div>
      );
    }

    function AdminAuthView({ setAdminName }) {
      return (
        <div className="max-w-md mx-auto mt-12 text-center">
          <div className="bg-white p-8 rounded-2xl shadow-sm border">
            <h2 className="text-xl font-bold mb-6">担当者を選択</h2>
            <div className="grid grid-cols-2 gap-3">
              {OFFICERS.map(name => <button key={name} onClick={() => setAdminName(name)} className="py-3 px-4 border rounded-xl font-bold hover:bg-slate-100">{name}</button>)}
            </div>
          </div>
        </div>
      );
    }

    function AdminDashboard({ members, setMembers, entries, setEntries, adminName, onLogout }) {
      const [activeTab, setActiveTab] = useState('members');

      const activeMembers = useMemo(() => {
        return [...members].filter(m => m.isActive).sort((a, b) => {
          if (a.grade === b.grade) return (a.kana||a.name).localeCompare(b.kana||b.name, 'ja');
          return (a.grade||'').localeCompare(b.grade||'', 'ja');
        });
      }, [members]);

      const togglePayment = (memberId, field) => {
        setMembers(prev => prev.map(m => m.id === memberId ? { ...m, payments: { ...m.payments, [field]: !m.payments?.[field] } } : m));
      };

      const toggleEntryPayment = (entryId) => {
        setEntries(prev => prev.map(e => e.id === entryId ? { ...e, isPaid: !e.isPaid, receivedBy: !e.isPaid ? adminName : '' } : e));
      };

      const handlePromoteAll = () => {
        if(!confirm("全員の学年を1つ上げます。よろしいですか？\n※中学3年生は「卒業(退会扱い)」になります。")) return;
        setMembers(prev => prev.map(m => {
          if (!m.isActive) return m;
          let newGrade = m.grade, newIsActive = true;
          switch (m.grade) {
            case '1年': newGrade = '2年'; break; case '2年': newGrade = '3年'; break;
            case '3年': newGrade = '4年'; break; case '4年': newGrade = '5年'; break;
            case '5年': newGrade = '6年'; break; case '6年': newGrade = '中学1年'; break;
            case '中学1年': newGrade = '中学2年'; break; case '中学2年': newGrade = '中学3年'; break;
            case '中学3年': newGrade = '卒業'; newIsActive = false; break;
          }
          return { ...m, grade: newGrade, isActive: newIsActive, status: 'updated', payments: {term1:false, term2:false, track:false, insurance:false, entrance: m.payments?.entrance || false} };
        }));
        alert("進級処理と集金ステータスのリセットが完了しました。");
      };

      return (
        <div className="space-y-6">
          <div className="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border">
            <div className="flex items-center font-bold text-slate-800"><UserCircle2 className="w-5 h-5 mr-2 text-slate-400" />{adminName} 役員</div>
            <button onClick={onLogout} className="text-sm text-slate-500 hover:underline">ログアウト</button>
          </div>

          <div className="flex bg-slate-200/50 p-1.5 rounded-xl gap-1 overflow-x-auto">
            <button onClick={() => setActiveTab('members')} className={`flex-1 min-w-[100px] py-2.5 rounded-lg text-sm font-bold flex items-center justify-center ${activeTab === 'members' ? 'bg-white text-emerald-800 shadow-sm' : 'text-slate-500'}`}><Users className="w-4 h-4 mr-1" />名簿</button>
            <button onClick={() => setActiveTab('accounting')} className={`flex-1 min-w-[100px] py-2.5 rounded-lg text-sm font-bold flex items-center justify-center ${activeTab === 'accounting' ? 'bg-white text-blue-800 shadow-sm' : 'text-slate-500'}`}><Banknote className="w-4 h-4 mr-1" />会計</button>
            <button onClick={() => setActiveTab('entries')} className={`flex-1 min-w-[100px] py-2.5 rounded-lg text-sm font-bold flex items-center justify-center ${activeTab === 'entries' ? 'bg-white text-amber-800 shadow-sm' : 'text-slate-500'}`}><Trophy className="w-4 h-4 mr-1" />大会</button>
          </div>

          {activeTab === 'members' && (
            <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
              <div className="p-4 border-b bg-slate-50 flex justify-between items-center">
                <h2 className="font-bold">在籍名簿 ({activeMembers.length}名)</h2>
                <button onClick={handlePromoteAll} className="text-xs bg-amber-100 text-amber-700 px-3 py-1.5 rounded-lg font-bold hover:bg-amber-200 flex items-center"><GraduationCap className="w-4 h-4 mr-1"/>一斉進級処理</button>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm">
                  <thead><tr className="bg-slate-50 text-slate-500 border-b"><th className="p-3">氏名</th><th className="p-3">学年/性別</th><th className="p-3">状態</th></tr></thead>
                  <tbody className="divide-y">
                    {activeMembers.map(m => (
                      <tr key={m.id} className="hover:bg-slate-50">
                        <td className="p-3 font-bold">{m.name}</td><td className="p-3">{m.grade}・{m.gender}</td>
                        <td className="p-3">
                          {m.status === 'new' && <span className="text-xs bg-emerald-100 text-emerald-700 px-2 py-1 rounded">新規</span>}
                          {m.status === 'updated' && <span className="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">更新済</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {activeTab === 'accounting' && (
            <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
              <div className="p-4 border-b bg-slate-50"><h2 className="font-bold">2026年度 集金表</h2></div>
              <div className="overflow-x-auto">
                <table className="w-full text-left text-xs min-w-[600px]">
                  <thead><tr className="bg-slate-50 text-slate-500 border-b"><th className="p-3 sticky left-0 bg-slate-50">氏名</th><th className="p-3 text-center">前期<br/>¥3,600</th><th className="p-3 text-center">後期<br/>¥3,600</th><th className="p-3 text-center">競技場<br/>¥500</th><th className="p-3 text-center">保険<br/>¥800</th><th className="p-3 text-center">協力金<br/>¥1,000</th></tr></thead>
                  <tbody className="divide-y">
                    {activeMembers.map(m => {
                      const p = m.payments || {};
                      const Btn = ({f, hl=false}) => <button onClick={()=>togglePayment(m.id, f)} className={`w-full py-2 rounded font-bold ${p[f]?'bg-green-100 text-green-700':hl?'bg-amber-50 text-amber-600':'bg-slate-50 text-slate-400 border'}`}>{p[f]?'済':'未'}</button>;
                      return (
                        <tr key={m.id} className="hover:bg-slate-50"><td className="p-3 font-bold sticky left-0 bg-white">{m.name}{m.status==='new'&&<span className="text-[10px] ml-1 bg-emerald-100 text-emerald-700 px-1 rounded">新</span>}</td><td className="p-2"><Btn f="term1"/></td><td className="p-2"><Btn f="term2"/></td><td className="p-2"><Btn f="track"/></td><td className="p-2"><Btn f="insurance"/></td><td className="p-2">{m.status==='new'?<Btn f="entrance" hl/>:'-'}</td></tr>
                      )
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          )}

          {activeTab === 'entries' && (
            <div className="bg-white rounded-2xl shadow-sm border overflow-hidden">
              <div className="overflow-x-auto">
                <table className="w-full text-left text-sm min-w-[500px]">
                  <thead><tr className="bg-slate-50 text-slate-500 border-b"><th className="p-3">氏名/大会</th><th className="p-3 text-right">金額</th><th className="p-3 text-center">集金状況</th></tr></thead>
                  <tbody className="divide-y">
                    {entries.length === 0 ? <tr><td colSpan="3" className="p-6 text-center text-slate-400">エントリーなし</td></tr> : entries.map(e => (
                      <tr key={e.id} className="hover:bg-slate-50">
                        <td className="p-3 font-bold">{e.name}<div className="text-xs text-slate-500 font-normal mt-1">{e.tournamentName}</div></td>
                        <td className="p-3 text-right font-bold">¥{e.fee.toLocaleString()}</td>
                        <td className="p-3 text-center"><button onClick={()=>toggleEntryPayment(e.id)} className={`px-3 py-1.5 rounded-lg text-xs font-bold ${e.isPaid?'bg-green-100 text-green-700':'bg-white text-slate-500 border'}`}>{e.isPaid?`受領済(${e.receivedBy})`:'未受領'}</button></td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
